<!DOCTYPE html>
<html>
<head>
<title>MK Manga AutoBot</title>
<style>
body{background:#0d1117;color:#fff;font-family:Arial;padding:20px}
.box{max-width:900px;margin:0 auto;background:#161b22;padding:20px;border-radius:12px}
input,button{width:100%;padding:14px;margin:10px 0;border-radius:8px;border:none;font-size:16px}
button{background:#f5c518;font-weight:700;cursor:pointer}
.chap{display:inline-block;background:#21262d;padding:8px 12px;margin:5px;border-radius:6px;cursor:pointer}
.chap.active{background:#f5c518;color:#000}
textarea{width:100%;height:400px;background:#000;color:#0f0;padding:10px}
</style>
</head>
<body>
<div class="box">
<h1 style="color:#f5c518">📖 MK MANGA AUTOBOT</h1>
<input id="url" placeholder="Paste MangaDex URL">
<button onclick="fetchManga()">Fetch</button>
<div id="result"></div>
<textarea id="code" style="display:none"></textarea>
</div>
<script>
async function fetchManga(){
  let url = document.getElementById("url").value;
  document.getElementById("result").innerHTML = "Loading...";
  let res = await fetch("/fetch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url})});
  let data = await res.json();
  if(!data.success) return alert(data.error);

  window.mangaData = data;
  let chaps = data.chapters.map(c=>`<span class="chap active" onclick="this.classList.toggle('active')" data-id="${c.id}">Ch ${c.num}</span>`).join("");

  document.getElementById("result").innerHTML = `
    <img src="${data.cover}" width="200">
    <h2>${data.title}</h2>
    <p>${data.desc}</p>
    <h3>Select Chapters:</h3>
    ${chaps}
    <button onclick="generate()">Generate Code</button>
  `;
}

async function generate(){
  let selected = [...document.querySelectorAll(".chap.active")].map(e=>e.dataset.id);
  let res = await fetch("/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({manga:window.mangaData,chapters:selected})});
  let data = await res.json();
  document.getElementById("code").value = data.code;
  document.getElementById("code").style.display = "block";
  document.getElementById("code").select();
  document.execCommand("copy");
  alert("Code Copied!");
}
</script>
</body>
</html>
